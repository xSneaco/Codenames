version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codenames-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-codenames}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-codenames_password}
      POSTGRES_DB: ${DB_NAME:-codenames}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codenames -d codenames"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: codenames-backend
    ports:
      - "3101:3001"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USER:-codenames}
      DATABASE_PASSWORD: ${DB_PASSWORD:-codenames_password}
      DATABASE_NAME: ${DB_NAME:-codenames}
      DATABASE_URL: postgresql://${DB_USER:-codenames}:${DB_PASSWORD:-codenames_password}@postgres:5432/${DB_NAME:-codenames}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:push && npm run start:prod"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_WS_URL: ""
    container_name: codenames-frontend
    ports:
      - "3004:3000"  # Changed: Next.js runs on port 3000
    environment:
      - BACKEND_URL=http://backend:3001  # For server-side API calls
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]  # Changed port to 3000
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local