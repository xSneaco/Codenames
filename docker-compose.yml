version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codenames-postgres
    environment:
      POSTGRES_USER: codenames
      POSTGRES_PASSWORD: codenames_password
      POSTGRES_DB: codenames
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codenames -d codenames"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: codenames-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: codenames
      DATABASE_PASSWORD: codenames_password
      DATABASE_NAME: codenames
      DATABASE_URL: postgresql://codenames:codenames_password@postgres:5432/codenames
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run start:dev"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
        VITE_WS_URL: http://localhost:3000
    container_name: codenames-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
